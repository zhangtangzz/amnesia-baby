{% extends "base.html" %}
{% block title %}角色聊天 - 失忆宝宝{% endblock %}
{% block content %}
<div class="chat-container">
    <div class="chat-sidebar">
        <h3>选择角色</h3>
        <div class="character-list" id="character-list">
            <!-- 动态加载 -->
        </div>
        <button class="btn-secondary" style="width:100%;margin-top:12px" onclick="showCreateForm()">+ 创建角色</button>

        <div id="create-form" style="display:none;margin-top:12px">
            <input type="text" id="new-char-id" placeholder="角色ID (英文)" style="width:100%;padding:6px;margin-bottom:6px;border:1px solid var(--border);border-radius:6px;font-size:13px">
            <input type="text" id="new-char-name" placeholder="角色名称" style="width:100%;padding:6px;margin-bottom:6px;border:1px solid var(--border);border-radius:6px;font-size:13px">
            <input type="text" id="new-char-avatar" placeholder="头像emoji (如 🧑)" style="width:100%;padding:6px;margin-bottom:6px;border:1px solid var(--border);border-radius:6px;font-size:13px">
            <input type="text" id="new-char-desc" placeholder="角色描述" style="width:100%;padding:6px;margin-bottom:6px;border:1px solid var(--border);border-radius:6px;font-size:13px">
            <div style="display:flex;gap:6px">
                <button class="btn-primary" style="flex:1" onclick="createCharacter()">创建</button>
                <button class="btn-secondary" style="flex:1" onclick="hideCreateForm()">取消</button>
            </div>
        </div>

        <div class="provider-select">
            <label>LLM 提供商</label>
            <select id="provider-select">
                <option value="">默认(小米MIMO)</option>
                <option value="xiaomi">小米 MIMO</option>
                <option value="openai">OpenAI</option>
                <option value="deepseek">DeepSeek</option>
                <option value="qwen">通义千问</option>
            </select>
        </div>
    </div>

    <div class="chat-main">
        <div class="chat-header">
            <span id="current-character">Elon Musk</span>
            <span class="chat-status" id="chat-status">就绪</span>
        </div>

        <div class="chat-messages" id="chat-messages">
            <div class="message system">
                <div class="message-content">欢迎！请选择角色开始对话。</div>
            </div>
        </div>

        <div class="chat-input-area">
            <textarea id="message-input" placeholder="输入消息..." rows="2" onkeydown="handleKeyDown(event)"></textarea>
            <button id="send-btn" onclick="sendMessage()">发送</button>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/chat.js"></script>
{% endblock %}
